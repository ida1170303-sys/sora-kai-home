<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Illustrations | Sora Kai</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC",
                   "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: #0b1a2a;
      color: rgba(255,255,255,0.9);
    }

    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 60px;
    }

    .back {
      text-decoration: none;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }

    .brand {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.4);
    }

    h1 {
      text-align: center;
      font-weight: 300;
      letter-spacing: 0.08em;
      margin-bottom: 80px;
      font-size: 2.5rem;
    }

    .placeholder {
      text-align: center;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.1em;
    }
  </style>
</head>

<body>
  <main class="page">

    <div class="topbar">
      <a class="back" href="/works">← Back</a>
      <div class="brand">CPLIN</div>
    </div>

    <h1>Illustrations</h1>

    <div class="placeholder">
      coming soon
    </div>

  </main>
</body>
</html>
