<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paintings | Sora Kai</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC",
                   "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: #111;
      color: rgba(255,255,255,0.9);
    }

    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px;
    }

    /* 上方 */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 60px;
    }

    .back {
      text-decoration: none;
      color: rgba(255,255,255,0.7);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }

    .brand {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.4);
    }

    h1 {
      text-align: center;
      font-weight: 300;
      letter-spacing: 0.08em;
      margin-bottom: 80px;
      font-size: 2.5rem;
    }

    /* 每一張作品 */
    .artwork {
      margin-bottom: 120px;
      text-align: center;
    }

    .artwork img {
      width: 100%;
      max-width: 720px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .caption {
      margin-top: 18px;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.5);
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
        margin-bottom: 60px;
      }

      .artwork {
        margin-bottom: 80px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <div class="topbar">
      <a class="back" href="/works">← Back</a>
      <div class="brand">CPLIN</div>
    </div>

    <h1>Paintings</h1>

    <!-- 第一張 -->
    <div class="artwork">
      <img src="painting01.jpg" alt="">
      <div class="caption">Untitled, 2025</div>
    </div>

    <!-- 第二張 -->
    <div class="artwork">
      <img src="painting02.jpg" alt="">
      <div class="caption">Night Lines, 2025</div>
    </div>

    <!-- 第三張 -->
    <div class="artwork">
      <img src="painting03.jpg" alt="">
      <div class="caption">Inner Movement</div>
    </div>

    <!-- 第四張 -->
    <div class="artwork">
      <img src="painting04.jpg" alt="">
      <div class="caption">Study</div>
    </div>
 
<!-- 第五張 -->
    <div class="artwork">
      <img src="painting05.jpg" alt="">
      <div class="caption">Untitled, 2025</div>
    </div>

    <!-- 第六張 -->
    <div class="artwork">
      <img src="painting06.jpg" alt="">
      <div class="caption">Night Lines, 2025</div>
    </div>

    <!-- 第七張 -->
    <div class="artwork">
      <img src="painting07.jpg" alt="">
      <div class="caption">Inner Movement</div>
    </div>

    <!-- 第八張 -->
    <div class="artwork">
      <img src="painting08.jpg" alt="">
      <div class="caption">Study</div>
    </div>

  </main>
</body>
</html>
