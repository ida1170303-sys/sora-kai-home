<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sora Kai</title>
  <style>
    body {
      margin: 0;
      font-family: "Noto Serif TC", serif;
      background: #0f0f10;
      color: #eaeaea;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: normal;
      letter-spacing: 2px;
      margin-bottom: 40px;
    }

    .intro {
      margin-bottom: 60px;
      line-height: 1.8;
      color: #bbb;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr;
      gap: 80px;
    }

    .work img {
      width: 100%;
      display: block;
      border-radius: 4px;
    }

    .caption {
      margin-top: 10px;
      font-size: 14px;
      color: #888;
      letter-spacing: 1px;
    }

    .footer {
      margin-top: 100px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Sora Kai</h1>

    <div class="intro">
      我畫風、光，以及生命存在的片刻。<br>
      Fragments of inner landscapes.
    </div>

    <div class="gallery">
      <div class="work">
        <img src="IMG_6131.jpg" alt="Fragment 01">
        <div class="caption">Fragment 01</div>
      </div>

      <div class="work">
        <img src="digital01.jpg" alt="Fragment 02">
        <div class="caption">Fragment 02</div>
      </div>

      <div class="work">
        <img src="sorakai_triangle_main.png" alt="Pattern">
        <div class="caption">Pattern</div>
      </div>

      <div class="work">
        <img src="digital02.jpg" alt="Cosmos">
        <div class="caption">Cosmos</div>
      </div>
    </div>

    <div class="footer">
      © Sora Kai
    </div>
  </div>

</body>
</html>
