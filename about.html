<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About | Sora Kai</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC",
                   "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: #111;
      color: rgba(255,255,255,0.92);
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .page {
      position: relative;
      flex: 1;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px 24px 48px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 72px;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255,255,255,0.72);
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .back:hover {
      opacity: 1;
      transform: translateX(-2px);
    }

    .brand {
      font-size: 0.82rem;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.5);
    }

    .content {
      width: min(100%, 760px);
      margin: 0 auto;
      padding-top: 4vh;
    }

    .eyebrow {
      font-size: 0.82rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.48);
      margin-bottom: 22px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      line-height: 1.2;
      margin-bottom: 42px;
      color: #fff;
    }

    .about-text {
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      line-height: 2;
      font-weight: 300;
      color: rgba(255,255,255,0.88);
      max-width: 34em;
    }

    .about-text p + p {
      margin-top: 1.8em;
    }

    .note {
      margin-top: 44px;
      font-size: 0.9rem;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.42);
    }

    .divider {
      width: 56px;
      height: 1px;
      background: rgba(255,255,255,0.18);
      margin: 36px 0 0;
    }

    @media (max-width: 768px) {
      .page {
        padding: 22px 20px 40px;
      }

      .topbar {
        margin-bottom: 52px;
      }

      .content {
        padding-top: 2vh;
      }

      .about-text {
        line-height: 1.95;
      }

      .note {
        letter-spacing: 0.14em;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <a class="back" href="/works" aria-label="返回 works 頁面">← Back</a>
      <div class="brand">CPLIN</div>
    </header>

    <section class="content" aria-label="About CPLIN">
      <div class="eyebrow">About</div>
      <h1>Sora Kai</h1>

      <div class="about-text">
        <p>
          CPLIN，來自台灣。
        </p>

        <p>
          曾在不同的空間之中停留，<br>
穿過劇場、語言、日常與沉默。<br>
如今留下來的，<br>
是那些仍在內心發光的片段。
        </p>

        <div class="divider"></div>

        <div class="note">paintings · words · inner landscapes</div>
      </div>
    </section>
  </main>
</body>
</html>
