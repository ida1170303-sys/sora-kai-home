<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Writing | Sora Kai</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC",
                   "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: #111;
      color: rgba(255,255,255,0.9);
    }

    body {
      line-height: 1.9;
    }

    .page {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 24px 72px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 56px;
    }

    .back {
      text-decoration: none;
      color: rgba(255,255,255,0.72);
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .back:hover {
      opacity: 1;
      transform: translateX(-2px);
    }

    .brand {
      font-size: 0.8rem;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.42);
    }

    h1 {
      text-align: center;
      font-weight: 300;
      letter-spacing: 0.08em;
      font-size: clamp(2rem, 5vw, 3.2rem);
      margin-bottom: 72px;
      color: #fff;
    }

    .intro {
      max-width: 620px;
      margin: 0 auto 72px;
      text-align: center;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.46);
    }

    .entry {
      max-width: 640px;
      margin: 0 auto 110px;
    }

    .entry-title {
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-bottom: 20px;
    }

    .entry-text {
      font-size: clamp(1.02rem, 1.5vw, 1.18rem);
      font-weight: 300;
      color: rgba(255,255,255,0.9);
    }

    .entry-text p + p {
      margin-top: 1.2em;
    }

    .divider {
      width: 42px;
      height: 1px;
      background: rgba(255,255,255,0.16);
      margin-top: 26px;
    }

    @media (max-width: 768px) {
      .page {
        padding: 22px 20px 56px;
      }

      .topbar {
        margin-bottom: 48px;
      }

      h1 {
        margin-bottom: 56px;
      }

      .intro {
        margin-bottom: 56px;
        font-size: 0.88rem;
      }

      .entry {
        margin-bottom: 84px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="back" href="/works">← Back</a>
      <div class="brand">CPLIN</div>
    </div>

    <h1>Writing</h1>
    <div class="intro">fragments · notes · inner landscapes</div>

    <section class="entry">
  <div class="entry-title">Daisy</div>

  <div class="entry-text">
    <p>
      我以為<br>
      我是<br>
      那善於等待的雛菊
    </p>

    <p>
      第一眼，就記起——<br>
      那是多少世的熟悉
    </p>

    <p>
      而漂泊的你<br>
      總是離去<br>
      留我在長夜裡嘆息<br>
      嚶嚶哭泣
    </p>

    <p>
      我正是<br>
      那善於等待的雛菊
    </p>

    <p>
      在你望見之前<br>
      已經——<br>
      羞怯地開放，又<br>
      靜默地凋萎
    </p>

    <p>
      錯過了我們<br>
      又是千萬年
    </p>
  </div>

  <div class="divider"></div>
</section><section class="entry">
  <div class="entry-title">Fragment II</div>

  <div class="entry-text">
    <p>
      路上
    </p>

    <p>
      大黃狗撲向<br>
      兩隻覓食的鴿子
    </p>

    <p>
      牠們輕巧振翅飛走<br>
      轉身看牠
    </p>

    <p>
      興奮的嘴角<br>
      仍帶著戲謔的笑
    </p>

    <p>
      莞爾
    </p>

    <p>
      那就是個當下
    </p>
  </div>

  <div class="divider"></div>
</section>
  </main>
</body>
</html>
